---
- name: Add Tailscale apt signing key
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/stable/debian/{{ ansible_facts['distribution_release'] }}.noarmor.gpg"
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: "0644"

- name: Add Tailscale apt repo
  ansible.builtin.deb822_repository:
    name: tailscale
    types: deb
    uris: https://pkgs.tailscale.com/stable/debian
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: main
    signed_by: /usr/share/keyrings/tailscale-archive-keyring.gpg
    state: present

- name: Install tailscale
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true

- name: Ensure tailscaled is running
  ansible.builtin.service:
    name: tailscaled
    state: started
    enabled: true

- name: Enable IPv4 forwarding for Tailscale subnet routing
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_file: /etc/sysctl.d/99-tailscale-subnet-router.conf
    reload: true
  when: tailscale_ip_forwarding

- name: Check tailscale status
  ansible.builtin.command: tailscale status --json
  register: ts_status
  changed_when: false
  failed_when: false

- name: Authenticate with tailscale
  ansible.builtin.command: >-
    tailscale up
    --authkey {{ tailscale_authkey }}
    --hostname {{ tailscale_hostname }}
    {{ ('--advertise-tags=' + tailscale_tags) if tailscale_tags else '' }}
  when: >-
    ts_status.rc != 0 or
    (ts_status.stdout | from_json).BackendState | default("NoState") != "Running"
  no_log: true

- name: Apply tailscale settings
  ansible.builtin.command: "tailscale set {{ tailscale_set_args }}"
  when: tailscale_set_args | trim | length > 0
  changed_when: false

- name: Ensure the Proxmox snippets directory exists
  ansible.builtin.file:
    path: /var/lib/vz/snippets
    state: directory
    mode: "0755"

- name: Install the qemu-guest-agent cloud-init vendor snippet
  ansible.builtin.copy:
    dest: /var/lib/vz/snippets/qemu-guest-agent.yaml
    mode: "0644"
    content: |
      #cloud-config
      # Referenced by VMs as vendor-data (terraform/vms.tf) so the guest agent
      # is present at first boot and agent=true holds from the first apply.
      package_update: true
      packages:
        - qemu-guest-agent
      runcmd:
        - systemctl enable --now qemu-guest-agent

- name: Read local datastore config
  ansible.builtin.command: /usr/bin/pvesh get /storage/local --output-format json
  register: local_datastore
  changed_when: false

- name: Enable required content types on the local datastore
  ansible.builtin.command: >-
    /usr/sbin/pvesm set local --content {{ (existing_content + required_content) | unique | join(',') }}
  vars:
    existing_content: "{{ (local_datastore.stdout | from_json).content | split(',') }}"
    required_content:
      - snippets
      - import
  when: "required_content | difference(existing_content) | length > 0"
  changed_when: true
