---
- name: Add PGDG apt repo
  ansible.builtin.deb822_repository:
    name: pgdg
    types: deb
    uris: https://apt.postgresql.org/pub/repos/apt
    suites: "{{ ansible_facts['distribution_release'] }}-pgdg"
    components: main
    signed_by: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    state: present

- name: Install PostgreSQL and supporting packages
  ansible.builtin.apt:
    name:
      - "postgresql-{{ postgres_version }}"
      - python3-psycopg2
      - acl # for `su`
    state: present
    update_cache: true

- name: Ensure postgresql is running
  ansible.builtin.service:
    name: "{{ postgres_service }}"
    state: started
    enabled: true

- name: Listen on the network (default is localhost only)
  community.postgresql.postgresql_alter_system:
    param: listen_addresses
    value: "{{ postgres_listen_addresses }}"
  become: true
  become_user: postgres
  become_method: su # minimal LXC has no sudo
  notify: Restart postgresql

- name: Allow LAN hosts to connect with a password
  community.postgresql.postgresql_pg_hba:
    dest: "/etc/postgresql/{{ postgres_version }}/main/pg_hba.conf"
    contype: host
    databases: all
    users: all
    source: "{{ postgres_allowed_subnet }}"
    method: scram-sha-256
  notify: Reload postgresql

- name: Set the postgres superuser password
  community.postgresql.postgresql_user:
    name: postgres
    password: "{{ postgres_superuser_password }}"
  become: true
  become_user: postgres
  become_method: su
  no_log: true
